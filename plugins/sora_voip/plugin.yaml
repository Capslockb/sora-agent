name: sora-voip
version: "0.1.0"
description: "Sora VOIP Bridge — Asterisk ARI + Dograh/Gemini Live for phone calls"
author: Capslockb
homepage: https://github.com/Capslockb/sora-agent
license: MIT
min_sora_version: "0.1.0"
entry_point: __init__.py
tools:
  - sora_voice_sip
  - sora_voice_ari
  - sora_voice_call
  - sora_voice_hangup
  - sora_voice_status
  - sora_voip_config
config_schema:
  asterisk_ari_url: "http://localhost:8088/ari"
  asterisk_username: "sora"
  asterisk_password: ""
  asterisk_app_name: "sora-bridge"
  dograh_ws_url: "wss://dograh.local/ws"
  dograh_api_key: ""
  gemini_model: "gemini-2.0-flash-exp"
  sample_rate: 48000
  channels: 1
  rtp_port_range: "10000-20000"
  auto_answer: true
  record_calls: false
  recording_dir: "~/.sora/recordings"