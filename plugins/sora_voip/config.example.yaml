# Sora VOIP Bridge Configuration
# Copy to ~/.config/sora/voip.yaml or set environment variables

voip:
  # Asterisk ARI Configuration
  asterisk:
    ari_url: "http://localhost:8088/ari"
    ari_user: "sora"
    ari_password: "changeme"  # Set in asterisk/manager.conf
    app_name: "sora"
    external_media_host: "0.0.0.0"
    external_media_port: 5000  # Base port (even numbers used for RTP)

  # Dograh WebSocket (fronts Gemini Live)
  dograh:
    ws_url: "ws://your-dograh-host:8080/gemini"  # REQUIRED
    api_key: ""  # Optional Dograh API key

  # Gemini Live Settings (passed via Dograh)
  gemini:
    model: "gemini-2.0-flash-exp"
    voice: "Puck"  # Puck, Charon, Kore, Fenrir, Aoede
    temperature: 0.7

  # HTTP Control API
  http_api:
    host: "0.0.0.0"
    port: 18944  # Different from discord-voice (18943)