# Local production Compose file for the combined full-stack container.
# A separate docker-compose.prod.yml is not needed for the MVP because this
# file builds the production Dockerfile, maps one deterministic port, injects
# only enumerated runtime variables, and validates /api/health.
services:
  voice-agent:
    # Compose reads .env for interpolation. Runtime values are enumerated below
    # so unrelated local secrets are not injected into the container.
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Public frontend build-time variables. Do not add server API keys here.
        VITE_ELEVENLABS_AGENT_ID: ${VITE_ELEVENLABS_AGENT_ID:-}
        VITE_ELEVENLABS_ENABLED: ${VITE_ELEVENLABS_ENABLED:-true}
        VITE_ELEVENLABS_SDK_ENABLED: ${VITE_ELEVENLABS_SDK_ENABLED:-true}
        VITE_WIDGET_ORB_COLOR_1: ${VITE_WIDGET_ORB_COLOR_1:-}
        VITE_WIDGET_ORB_COLOR_2: ${VITE_WIDGET_ORB_COLOR_2:-}
        VITE_WIDGET_VARIANT: ${VITE_WIDGET_VARIANT:-compact}
        VITE_WIDGET_ACTION_TEXT: ${VITE_WIDGET_ACTION_TEXT:-Talk to AI}
        VITE_WIDGET_START_CALL_TEXT: ${VITE_WIDGET_START_CALL_TEXT:-Start Conversation}
        VITE_WIDGET_END_CALL_TEXT: ${VITE_WIDGET_END_CALL_TEXT:-End Conversation}
        VITE_WIDGET_LISTENING_TEXT: ${VITE_WIDGET_LISTENING_TEXT:-Listening...}
        VITE_WIDGET_SPEAKING_TEXT: ${VITE_WIDGET_SPEAKING_TEXT:-Speaking...}
        VITE_WIDGET_AVATAR_URL: ${VITE_WIDGET_AVATAR_URL:-}
        VITE_WIDGET_OVERRIDE_VOICE_ID: ${VITE_WIDGET_OVERRIDE_VOICE_ID:-}
        VITE_WIDGET_OVERRIDE_LANGUAGE: ${VITE_WIDGET_OVERRIDE_LANGUAGE:-}
        VITE_WIDGET_OVERRIDE_FIRST_MESSAGE: ${VITE_WIDGET_OVERRIDE_FIRST_MESSAGE:-Hello! How can I help you today?}
        VITE_XAI_ENABLED: ${VITE_XAI_ENABLED:-true}
        VITE_XAI_MODEL: ${VITE_XAI_MODEL:-grok-2-public}
        VITE_XAI_VOICE: ${VITE_XAI_VOICE:-Ara}
        VITE_XAI_INSTRUCTIONS: ${VITE_XAI_INSTRUCTIONS:-You are a helpful voice assistant powered by Grok. Keep responses conversational and concise since they will be spoken aloud.}
        VITE_OPENAI_ENABLED: ${VITE_OPENAI_ENABLED:-true}
        VITE_OPENAI_MODEL: ${VITE_OPENAI_MODEL:-gpt-realtime}
        VITE_OPENAI_VOICE: ${VITE_OPENAI_VOICE:-alloy}
        VITE_OPENAI_INSTRUCTIONS: ${VITE_OPENAI_INSTRUCTIONS:-You are a helpful voice assistant. Keep responses conversational and concise.}
        VITE_OPENAI_TRANSLATION_ENABLED: ${VITE_OPENAI_TRANSLATION_ENABLED:-false}
        VITE_OPENAI_TRANSLATION_MAX_SESSION_MINUTES: ${VITE_OPENAI_TRANSLATION_MAX_SESSION_MINUTES:-30}
        VITE_ULTRAVOX_ENABLED: ${VITE_ULTRAVOX_ENABLED:-true}
        VITE_ULTRAVOX_VOICE: ${VITE_ULTRAVOX_VOICE:-Mark}
        VITE_ULTRAVOX_INSTRUCTIONS: ${VITE_ULTRAVOX_INSTRUCTIONS:-You are a helpful voice assistant. Keep responses conversational and concise.}
        VITE_ULTRAVOX_MODEL: ${VITE_ULTRAVOX_MODEL:-}
        VITE_VAPI_ENABLED: ${VITE_VAPI_ENABLED:-true}
        VITE_VAPI_WEB_TOKEN: ${VITE_VAPI_WEB_TOKEN:-}
        VITE_VAPI_API_URL: ${VITE_VAPI_API_URL:-}
        VITE_VAPI_ASSISTANT_ID: ${VITE_VAPI_ASSISTANT_ID:-}
        VITE_VAPI_VOICE: ${VITE_VAPI_VOICE:-paula}
        VITE_VAPI_MODEL: ${VITE_VAPI_MODEL:-gpt-4o-mini}
        VITE_VAPI_SYSTEM_PROMPT: ${VITE_VAPI_SYSTEM_PROMPT:-You are a helpful voice assistant. Keep responses conversational and concise.}
        VITE_VAPI_FIRST_MESSAGE: ${VITE_VAPI_FIRST_MESSAGE:-Hello! How can I help you today?}
        VITE_RETELL_ENABLED: ${VITE_RETELL_ENABLED:-true}
        VITE_RETELL_AGENT_ID: ${VITE_RETELL_AGENT_ID:-}
        VITE_GEMINI_ENABLED: ${VITE_GEMINI_ENABLED:-false}
        VITE_GEMINI_MODEL: ${VITE_GEMINI_MODEL:-gemini-2.5-flash-native-audio-preview-12-2025}
        VITE_GEMINI_VOICE: ${VITE_GEMINI_VOICE:-Zephyr}
        VITE_GEMINI_INSTRUCTIONS: ${VITE_GEMINI_INSTRUCTIONS:-You are a helpful voice assistant. Keep responses conversational and concise.}
        VITE_DEFAULT_PROVIDER: ${VITE_DEFAULT_PROVIDER:-elevenlabs}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/}
        VITE_NODE_ENV: ${VITE_NODE_ENV:-production}
    ports:
      - "${HOST_PORT:-3001}:${SERVER_PORT:-3001}"
    environment:
      # Server runtime variables
      NODE_ENV: production
      SERVER_PORT: ${SERVER_PORT:-3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      # Local production smoke tests often use localhost-only origins. Remote
      # deployments use docker-compose.deploy.yml, which keeps this disabled.
      ALLOW_LOCALHOST_PRODUCTION_CORS: ${ALLOW_LOCALHOST_PRODUCTION_CORS:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REQUEST_LOGGING_ENABLED: ${REQUEST_LOGGING_ENABLED:-true}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      UPTIME_MONITOR_URL: ${UPTIME_MONITOR_URL:-}
      UPTIME_ALERT_DESTINATION: ${UPTIME_ALERT_DESTINATION:-}
      # Runtime provider credentials and public identifiers loaded from .env.
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      VITE_ELEVENLABS_AGENT_ID: ${VITE_ELEVENLABS_AGENT_ID:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ULTRAVOX_API_KEY: ${ULTRAVOX_API_KEY:-}
      VITE_VAPI_WEB_TOKEN: ${VITE_VAPI_WEB_TOKEN:-}
      RETELL_API_KEY: ${RETELL_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --timeout=5 --spider \"http://127.0.0.1:$${SERVER_PORT:-3001}/api/health\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
